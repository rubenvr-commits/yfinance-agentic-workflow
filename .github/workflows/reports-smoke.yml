name: Reports Smoke Test

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
      - name: Run test suite
        run: |
          pytest -q || true
      - name: Validate example generated metrics.json if present
        run: |
          if [ -f evaluaciones/AAPL/raw-search/metrics.json ]; then
            python .github/scripts/validate_generated_json.py evaluaciones/AAPL/raw-search/metrics.json || exit 1
          else
            echo "No example metrics.json found; skipping validation"
          fi
